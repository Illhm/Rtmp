version: '3.8'
services:
  rtmp-server:
    build: .
    container_name: rtmp-server
    ports:
      - "1935:1935" # RTMP port
      - "3000:3000" # API status port (and Frontend Web Player)
      - "8000:8000" # HTTP-FLV Streaming port
    environment:
      - NODE_ENV=production
      - API_PORT=3000
    restart: unless-stopped
